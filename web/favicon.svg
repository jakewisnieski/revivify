<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- support stake (the "prop") -->
  <rect x="18.2" y="9" width="2.6" height="18" rx="1.3" fill="#8b7cf6" />
  <!-- tie holding the stem to the stake -->
  <rect x="12.5" y="16.6" width="8.7" height="2.3" rx="1.15" fill="#8b7cf6" />
  <!-- stem, leaning onto the support -->
  <path d="M13.6 27 C13.4 22 14 18 15 14.6" stroke="#57c97e" stroke-width="2.7" stroke-linecap="round" fill="none" />
  <!-- left leaf -->
  <path d="M14.6 16.4 C10.1 16 7.4 13.2 7.9 9.8 C11.7 10.3 14.1 12.8 14.6 16.4 Z" fill="#57c97e" />
  <!-- top leaf -->
  <path d="M15 14.6 C15.8 10.9 18 9.1 21 9.7 C20.4 13.1 17.8 14.9 15 14.6 Z" fill="#69d891" />
  <!-- ground -->
  <path d="M9 27.2 Q16 25.4 23 27.2" stroke="#3a4a41" stroke-width="1.8" stroke-linecap="round" fill="none" />
</svg>
